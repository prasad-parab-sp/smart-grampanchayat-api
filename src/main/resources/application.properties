spring.application.name=smart-grampanchayat-api
spring.profiles.default=dev

# Per-district Hikari pools (credentials come from master districts table)
app.district-shard.datasource.maximum-pool-size=5
app.district-shard.datasource.connection-timeout-ms=15000

# Root DEBUG floods logs with JMX/RMI when an IDE or profiler polls MBeans (HeapMemoryUsage, ProcessCpuLoad, …).
logging.level.root=INFO
logging.level.com.asset.smartgrampanchayatapi=DEBUG

logging.level.sun.rmi=WARN
logging.level.javax.management=WARN
logging.level.java.rmi=WARN

spring.jmx.enabled=false

# districts.db_password is always encrypted — key is defined per profile (dev/test/prod).
